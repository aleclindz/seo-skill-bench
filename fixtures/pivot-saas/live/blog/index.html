<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Lumina</title>
  <meta name="description" content="The Lumina blog: articles on meetings, productivity, and teamwork.">
  <link rel="canonical" href="https://lumina.example/blog">
  <meta property="og:title" content="Blog — Lumina">
  <meta property="og:description" content="Articles on meetings, productivity, and teamwork.">
  <meta property="og:image" content="https://lumina.example/img/og-lumina.png">
  <meta property="og:url" content="https://lumina.example/blog">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <header>
    <nav>
      <a href="/">Lumina</a>
      <a href="/features">Features</a>
      <a href="/pricing">Pricing</a>
      <a href="/blog">Blog</a>
      <a href="/faq">FAQ</a>
    </nav>
  </header>

  <main>
    <h1>Blog</h1>
    <div id="post-list" class="post-list">
      <div class="loading-spinner">Loading posts&hellip;</div>
    </div>
  </main>

  <script>
    // Posts are fetched client-side from the content API and rendered into #post-list.
    fetch('/api/posts')
      .then(function (r) { return r.json(); })
      .then(function (posts) {
        var list = document.getElementById('post-list');
        list.innerHTML = posts.map(function (p) {
          return '<article><h2>' + p.title + '</h2><p>' + p.excerpt + '</p></article>';
        }).join('');
      })
      .catch(function () {
        document.querySelector('.loading-spinner').textContent = 'Could not load posts.';
      });
  </script>

  <footer>
    <p>&copy; 2026 Lumina Labs, Inc.</p>
  </footer>
</body>
</html>
